name: ${COMPOSE_PROJECT_NAME:-airflow-demo}

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE:-airflow-demo/airflow:0.1.0}
  build:
    context: ./airflow_image
  user: "${AIRFLOW_UID:-1005}:0"
  environment: &airflow-common-env
    TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_DEFAULT_TIMEZONE:-Asia/Shanghai}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-airflow}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-airflow}
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: ${AIRFLOW_DEFAULT_UI_TIMEZONE:-Asia/Shanghai}
    AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-mailhog}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-1025}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${MAIL_FROM:-airflow-demo@example.com}
    CONTAINER_SHARED_ROOT: ${CONTAINER_SHARED_ROOT:-/data/airflow-demo}
    AIRFLOW_DAGS_ROOT: ${AIRFLOW_DAGS_ROOT:-/opt/airflow/dags}
    PGTA_CONTAINER_ROOT: ${PGTA_CONTAINER_ROOT:-/opt/pipelines/PGT_A}
    PGTA_CONTAINER_DATA_ROOT: ${PGTA_CONTAINER_DATA_ROOT:-/data/project/CNV/PGT-A}
    PGTA_SNAKEMAKE9_BIN: ${PGTA_SNAKEMAKE9_BIN:-/biosoftware/miniconda/envs/snakemake9_env/bin/snakemake}
    PGTA_SNAKEMAKE_CORES: ${PGTA_SNAKEMAKE_CORES:-64}
    PGTA_PYTHON_BIN: ${PGTA_PYTHON_BIN:-/biosoftware/miniconda/envs/snakemake_env/bin/python}
    PGTA_CONDA_LIB: ${PGTA_CONDA_LIB:-/biosoftware/miniconda/envs/snakemake_env/lib}
    PGTA_REFERENCE_GENOME: ${PGTA_REFERENCE_GENOME:-/data/Database/index/hg19/hg19.fa}
    PGTA_SAMTOOLS_BIN: ${PGTA_SAMTOOLS_BIN:-/biosoftware/miniconda/pkgs/samtools-1.7-1/bin/samtools}
    PGTA_SAMTOOLS_LIBRARY_PATH: ${PGTA_SAMTOOLS_LIBRARY_PATH:-/biosoftware/miniconda/pkgs/openssl-1.0.2u-h516909a_0/lib}
    AIRFLOW_PIPELINES_ROOT: ${AIRFLOW_PIPELINES_ROOT:-/opt/airflow/pipelines}
    AIRFLOW_PROFILES_ROOT: ${AIRFLOW_PROFILES_ROOT:-/opt/airflow/profiles}
    AIRFLOW_DEMO_QSUB_MODE: ${AIRFLOW_DEMO_QSUB_MODE:-mock}
    AIRFLOW_DEMO_QSUB_PYTHON: ${AIRFLOW_DEMO_QSUB_PYTHON:-python}
  volumes:
    - ./dags:/opt/airflow/dags:ro
    - ./pipelines:/opt/airflow/pipelines:ro
    - ./profiles:/opt/airflow/profiles:ro
    - ./shared:/data/airflow-demo
    - ${PGTA_PIPELINE_ROOT:-/home/jiucheng/pipelines/PGT_A}:${PGTA_CONTAINER_ROOT:-/opt/pipelines/PGT_A}:ro
    - ${BIOSOFTWARE_ROOT:-/biosoftware}:/biosoftware:ro
    - ${PGTA_DATA_ROOT:-/data/project/CNV/PGT-A}:${PGTA_CONTAINER_DATA_ROOT:-/data/project/CNV/PGT-A}:ro
    - ${REFERENCE_ROOT:-/data/Database}:${CONTAINER_REFERENCE_ROOT:-/data/Database}:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    biodemo-net:

services:
  postgres:
    image: postgres:15-alpine
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      biodemo-net:
        ipv4_address: ${POSTGRES_IP:-172.30.10.40}

  redis:
    image: redis:7-alpine
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      biodemo-net:
        ipv4_address: ${REDIS_IP:-172.30.10.50}

  mailhog:
    image: mailhog/mailhog:v1.0.1
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"
    networks:
      biodemo-net:
        ipv4_address: ${MAILHOG_IP:-172.30.10.60}

  biodemo-db-init:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
      BIODEMO_DB: ${BIODEMO_DB:-biodemo}
      BIODEMO_USER: ${BIODEMO_USER:-biodemo}
      BIODEMO_PASSWORD: ${BIODEMO_PASSWORD:?Set BIODEMO_PASSWORD in .env}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" \
          -v ON_ERROR_STOP=1 \
          -v biodemo_db="$${BIODEMO_DB}" \
          -v biodemo_user="$${BIODEMO_USER}" \
          -v biodemo_password="$${BIODEMO_PASSWORD}" <<'SQL'
        SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'biodemo_user', :'biodemo_password')
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'biodemo_user') \gexec
        SELECT format('ALTER ROLE %I WITH LOGIN PASSWORD %L', :'biodemo_user', :'biodemo_password') \gexec
        SELECT format('CREATE DATABASE %I OWNER %I', :'biodemo_db', :'biodemo_user')
        WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'biodemo_db') \gexec
        SQL
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${BIODEMO_DB}" \
          -v ON_ERROR_STOP=1 \
          -v biodemo_user="$${BIODEMO_USER}" <<'SQL'
        SELECT format('GRANT USAGE, CREATE ON SCHEMA public TO %I', :'biodemo_user') \gexec
        SQL
    networks:
      biodemo-net:

  backend:
    image: ${BACKEND_IMAGE:-airflow-demo/backend:0.1.0}
    build:
      context: ./backend
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL:-http://airflow-api-server:8080}
      AIRFLOW_API_USERNAME: ${AIRFLOW_API_USERNAME:-admin}
      AIRFLOW_API_PASSWORD: ${AIRFLOW_API_PASSWORD:?Set AIRFLOW_API_PASSWORD in .env}
      CONTAINER_SHARED_ROOT: ${CONTAINER_SHARED_ROOT:-/data/airflow-demo}
      INPUT_SCAN_ROOTS: ${INPUT_SCAN_ROOTS:-/data/project/CNV/PGT-A/rawdata}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./shared:/data/airflow-demo
      - ${PGTA_DATA_ROOT:-/data/project/CNV/PGT-A}:${PGTA_CONTAINER_DATA_ROOT:-/data/project/CNV/PGT-A}:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      biodemo-net:
        ipv4_address: ${BACKEND_IP:-172.30.10.20}

  frontend:
    image: ${FRONTEND_IMAGE:-airflow-demo/frontend:0.1.0}
    build:
      context: ./frontend
      args:
        VITE_DISPLAY_TIME_ZONE: ${FRONTEND_DISPLAY_TIME_ZONE:-Asia/Shanghai}
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-12959}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      biodemo-net:
        ipv4_address: ${FRONTEND_IP:-172.30.10.30}

  snakemake-runner:
    image: ${SNAKEMAKE_RUNNER_IMAGE:-airflow-demo/snakemake-runner:0.1.0}
    build:
      context: ./snakemake_runner
    working_dir: /app
    environment:
      TZ: ${AIRFLOW_DEMO_TZ:-Asia/Shanghai}
      AIRFLOW_DEMO_QSUB_MODE: ${AIRFLOW_DEMO_QSUB_MODE:-mock}
      AIRFLOW_DEMO_QSUB_PYTHON: ${AIRFLOW_DEMO_QSUB_PYTHON:-python}
    volumes:
      - .:/app:ro
      - ./shared:/data/airflow-demo
      - type: tmpfs
        target: /app/.snakemake
    networks:
      biodemo-net:

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        airflow db migrate
        if airflow users list | grep -F "$${AIRFLOW_ADMIN_USERNAME}" >/dev/null; then
          echo "Airflow admin user already exists: $${AIRFLOW_ADMIN_USERNAME}"
        else
          airflow users create \
            --username "$${AIRFLOW_ADMIN_USERNAME}" \
            --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}" \
            --lastname "$${AIRFLOW_ADMIN_LASTNAME}" \
            --role Admin \
            --email "$${AIRFLOW_ADMIN_EMAIL}" \
            --password "$${AIRFLOW_ADMIN_PASSWORD}"
        fi
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?Set AIRFLOW_ADMIN_PASSWORD in .env}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-airflow-demo@example.com}
    networks:
      biodemo-net:

  airflow-api-server:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-12958}:8080"
    networks:
      biodemo-net:
        ipv4_address: ${AIRFLOW_API_IP:-172.30.10.10}

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    networks:
      biodemo-net:
        ipv4_address: ${AIRFLOW_SCHEDULER_IP:-172.30.10.11}

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    networks:
      biodemo-net:
        ipv4_address: ${AIRFLOW_WORKER_IP:-172.30.10.12}

volumes:
  postgres-data:

networks:
  biodemo-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.30.10.0/24}
          gateway: ${DOCKER_GATEWAY:-172.30.10.1}
